<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Read Later Is Broken</title>
  </head>
  <body>
    <main id="app" class="popup-shell">
      <form id="send-form" class="send-form">
        <div class="action-row">
          <button id="send-button" type="submit">NotebookLM に追加</button>
        </div>

        <fieldset>
          <legend>追加先</legend>

          <div class="destination-toolbar">
            <input id="destination-search" type="search" aria-label="ノートブック検索" placeholder="ノートブックを検索" />
            <button id="refresh-notebooks-button" type="button" class="secondary-button small">一覧を更新</button>
          </div>

          <div id="destination-list" class="destination-checklist" aria-label="登録済みNotebookLMノートブック"></div>

          <div class="extra-destination-list" aria-label="追加NotebookLMノートブック">
            <div class="destination-check-row special-destination-row">
              <input id="new-notebook-enabled" type="checkbox" />
              <span>
                <strong>新しいノートブック</strong>
                <input id="new-title" type="text" aria-label="新規ノートブック名" placeholder="ページタイトル" />
              </span>
            </div>

            <label class="destination-check-row special-destination-row">
              <input id="daily-destination-enabled" type="checkbox" />
              <span>
                <strong id="daily-title">Daily yyyy-MM-dd</strong>
              </span>
            </label>

            <label class="destination-check-row special-destination-row">
              <input id="weekly-destination-enabled" type="checkbox" />
              <span>
                <strong id="weekly-title">Weekly yyyy-Www</strong>
              </span>
            </label>

            <label class="destination-check-row special-destination-row">
              <input id="monthly-destination-enabled" type="checkbox" />
              <span>
                <strong id="monthly-title">Monthly yyyy-MM</strong>
              </span>
            </label>
          </div>
        </fieldset>
      </form>

      <p id="message" class="message" role="status"></p>
      <p id="last-result" class="message last-result" role="status"></p>

      <footer>
        Independent helper. Not affiliated with Google or NotebookLM.
      </footer>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
