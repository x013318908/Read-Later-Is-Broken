<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="extensionName">Read Later Is Broken</title>
  </head>
  <body>
    <main id="app" class="popup-shell">
      <form id="digest-form" class="send-form">
        <fieldset class="target-group digest-group">
          <legend data-i18n="digest">Digest</legend>

          <div class="action-row">
            <button id="send-button" type="submit" data-i18n="addToNotebookLm">Add to NotebookLM</button>
          </div>

          <details class="digest-destination-settings">
            <summary class="digest-destination-summary">
              <span id="digest-destination-summary-label" data-i18n="destinations">Destinations</span>
              <span id="digest-destination-summary-counts" class="digest-summary-counts"></span>
            </summary>

            <div
              class="extra-destination-list"
              aria-label="Digest NotebookLM notebooks"
              data-i18n-aria-label="digestNotebookListLabel"
            >
              <label class="destination-check-row special-destination-row digest-destination-row">
                <input id="daily-destination-enabled" type="checkbox" />
                <span>
                  <span class="destination-name-line">
                    <strong id="daily-title">Daily yyyy-MM-dd</strong>
                    <span id="daily-source-count" class="source-count-badge" hidden></span>
                  </span>
                </span>
              </label>

              <label class="destination-check-row special-destination-row digest-destination-row">
                <input id="weekly-destination-enabled" type="checkbox" />
                <span>
                  <span class="destination-name-line">
                    <strong id="weekly-title">Weekly yyyy-Www</strong>
                    <span id="weekly-source-count" class="source-count-badge" hidden></span>
                  </span>
                </span>
              </label>

              <label class="destination-check-row special-destination-row digest-destination-row">
                <input id="monthly-destination-enabled" type="checkbox" />
                <span>
                  <span class="destination-name-line">
                    <strong id="monthly-title">Monthly yyyy-MM</strong>
                    <span id="monthly-source-count" class="source-count-badge" hidden></span>
                  </span>
                </span>
              </label>
            </div>
          </details>
        </fieldset>
      </form>

      <form id="theme-form" class="send-form">
        <fieldset class="target-group theme-group">
          <legend data-i18n="theme">Theme</legend>

          <div class="destination-toolbar">
            <button id="refresh-notebooks-button" type="button" class="secondary-button small" data-i18n="refreshNotebooks">
              Refresh list
            </button>
          </div>

          <div class="notebook-create-toolbar">
            <input
              id="destination-search"
              type="search"
              aria-label="Notebook search and new notebook name"
              placeholder="Search notebooks / new name"
              data-i18n-aria-label="notebookSearchCreateLabel"
              data-i18n-placeholder="notebookSearchCreatePlaceholder"
            />
            <button id="create-notebook-button" type="button" class="secondary-button small" data-i18n="create">
              Create
            </button>
          </div>

          <div
            id="destination-list"
            class="destination-checklist"
            aria-label="Registered NotebookLM notebooks"
            data-i18n-aria-label="registeredNotebookListLabel"
          ></div>
          <div id="destination-count" class="destination-count" aria-live="polite">0 notebooks</div>

          <div class="action-row">
            <button id="theme-send-button" type="submit" data-i18n="addToNotebookLm">Add to NotebookLM</button>
          </div>
        </fieldset>
      </form>

      <p id="message" class="message" role="status"></p>
      <p id="last-result" class="message last-result" role="status"></p>

      <footer>
        <span data-i18n="footerDisclaimer">Independent helper. Not affiliated with Google or NotebookLM.</span>
      </footer>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>
