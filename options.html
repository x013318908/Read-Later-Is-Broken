<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Read Later Is Broken Options</title>
  </head>
  <body>
    <main class="options-shell">
      <section class="intro">
        <p class="product">Read Later Is Broken</p>
        <h1>保存先ノートブック</h1>
        <p>NotebookLM のノートブック URL を手動で登録します。Google や NotebookLM の公式ツールではありません。</p>
      </section>

      <form id="destination-form" class="destination-form">
        <label>
          表示名
          <input id="destination-name" type="text" placeholder="例: AI記事" required />
        </label>
        <label>
          NotebookLM URL
          <input id="destination-url" type="url" placeholder="https://notebooklm.google.com/..." required />
        </label>
        <button type="submit">保存先を追加</button>
        <p id="form-message" class="form-message" role="status"></p>
      </form>

      <section aria-labelledby="saved-heading" class="saved-section">
        <h2 id="saved-heading">登録済み</h2>
        <div id="empty-state" class="empty-state">まだ保存先がありません。</div>
        <ul id="destination-list" class="destination-list"></ul>
      </section>

      <section aria-labelledby="diagnostic-heading" class="diagnostic-section">
        <div class="section-header">
          <h2 id="diagnostic-heading">最後の追加結果</h2>
          <button id="copy-diagnostic-button" type="button" class="secondary-button small">コピー</button>
        </div>
        <div id="diagnostic-empty" class="empty-state">まだ追加結果はありません。</div>
        <dl id="diagnostic-list" class="diagnostic-list"></dl>
      </section>

      <footer>
        Deep Dive は自動生成しません。This project is not affiliated with Google or NotebookLM.
      </footer>
    </main>
    <script type="module" src="/src/options/main.ts"></script>
  </body>
</html>
